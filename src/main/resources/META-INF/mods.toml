modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
#issueTrackerURL="https://change.me.to.your.issue.tracker.example.invalid/"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
#updateJSONURL="https://change.me.example.invalid/updates.json"
#displayURL="https://change.me.to.your.mods.homepage.example.invalid/"
logoFile="gregwolvescore.png"
credits="FlowerChild & the Better than Wolves CE team, for the BTW features"
authors="${mod_authors}"
displayTest="MATCH_VERSION"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}" #mandatory
    ordering="NONE"
    side="BOTH"
# Here's another dependency
[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    # This version range declares a minimum of the current minecraft version up to but not including the next major version
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
[[dependencies.${mod_id}]]
    modId="gtceu"
    mandatory=true
    versionRange="${project.gtceu_version_range}"
    ordering="AFTER"
    side="BOTH"
[[dependencies.${mod_id}]]
    modId="terrablender"
    mandatory=true
    versionRange="${project.terrablender_version_range}"
    ordering="AFTER"
    side="BOTH"
[[dependencies.${mod_id}]]
    modId = "terrablender"
    mandatory = true
    versionRange = "[1,)"
    ordering = "NONE"
    side = "BOTH"
[[dependencies.${mod_id}]]
    modId = "farmersdelight"
    mandatory = true
    versionRange = "[1,)"
    ordering = "AFTER"
    side = "BOTH"
[[dependencies.${mod_id}]]
    modId = "natures_spirit"
    mandatory = true
    versionRange = "[1,)"
    ordering = "AFTER"
    side = "BOTH"
